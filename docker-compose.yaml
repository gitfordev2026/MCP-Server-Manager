services:
  backend:
    container_name: fastapi-backend
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "
      sleep 2 &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    container_name: nextjs-frontend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - ./frontend:/app
      - /app/node_modules   # IMPORTANT: anonymous volume
    command: >
      sh -c "
      sleep 5 &&
      npm run dev
      "
